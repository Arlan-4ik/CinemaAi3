<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineAI — Классификатор жанров</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @media (max-width: 768px) {
  header {
    padding: 16px 20px;
  }

  header h1 { font-size: 20px; }

  .hero {
    padding: 30px 16px;
  }

  .hero h2 {
    font-size: 26px;
  }

  .hero p {
    font-size: 15px;
    margin-bottom: 24px;
  }

  .input-card {
    padding: 20px;
  }

  textarea {
    height: 100px;
    font-size: 15px;
  }

  .btn-primary, .btn-recommend {
    font-size: 15px;
    padding: 14px;
  }

  .genre-select-wrap {
    flex-direction: column;
  }

  .history-section, .stats-section, .recommend-section, .game-section {
    padding: 0 16px;
  }

  .history-item {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .history-right {
    text-align: left;
  }

  .history-text {
    max-width: 100%;
  }

  .chart-label {
    width: 90px;
    font-size: 12px;
  }

  .movie-item {
    flex-direction: column;
  }

  .movie-rank {
    font-size: 18px;
  }

  .genre-btns {
    grid-template-columns: repeat(2, 1fr);
  }

  .result-genre {
    font-size: 28px;
  }

  .result-emoji {
    font-size: 44px;
  }
}

@media (max-width: 480px) {
  .hero h2 { font-size: 22px; }
  .genre-btns { grid-template-columns: 1fr; }
}

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 20px 40px;
      display: flex;
      align-items: center;
      gap: 15px;
      border-bottom: 1px solid #ffffff15;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header span { font-size: 30px; }

    .hero {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      padding: 60px 40px;
      text-align: center;
      border-bottom: 1px solid #ffffff10;
    }

    .hero h2 {
      font-size: 42px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: #94a3b8;
      font-size: 18px;
      margin-bottom: 40px;
    }

    .input-card {
      background: #1e1e2e;
      border: 1px solid #ffffff15;
      border-radius: 20px;
      padding: 30px;
      max-width: 700px;
      margin: 0 auto;
      box-shadow: 0 20px 60px #00000060;
    }

    .input-card label {
      display: block;
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    textarea {
      width: 100%;
      height: 120px;
      background: #0f0f1a;
      border: 1px solid #ffffff20;
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      resize: none;
      outline: none;
      transition: border 0.3s;
    }

    textarea:focus { border-color: #a78bfa; }

    textarea::placeholder { color: #4a4a6a; }

    .btn-primary {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loader {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #94a3b8;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #ffffff20;
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card {
      display: none;
      max-width: 700px;
      margin: 20px auto 0;
      background: linear-gradient(135deg, #1e1e2e, #16213e);
      border: 1px solid #a78bfa40;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .result-emoji { font-size: 56px; margin-bottom: 12px; }

    .result-genre {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }

    .confidence-bar-wrap {
      background: #0f0f1a;
      border-radius: 50px;
      height: 10px;
      overflow: hidden;
      margin: 0 auto 8px;
      max-width: 300px;
    }

    .confidence-bar {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border-radius: 50px;
      transition: width 1s ease;
    }

    .confidence-text { color: #94a3b8; font-size: 15px; }

    /* История */
    .history-section {
      max-width: 900px;
      margin: 50px auto;
      padding: 0 20px 60px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .history-header h3 {
      font-size: 22px;
      font-weight: 700;
      color: #e2e8f0;
    }

    .btn-clear {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid #ef444460;
      border-radius: 10px;
      color: #ef4444;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-clear:hover { background: #ef444415; border-color: #ef4444; }

    .history-empty {
      text-align: center;
      color: #4a4a6a;
      padding: 40px;
      background: #1e1e2e;
      border-radius: 16px;
      border: 1px dashed #ffffff15;
    }

    .history-item {
      background: #1e1e2e;
      border: 1px solid #ffffff10;
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border 0.2s;
      animation: fadeIn 0.3s ease;
    }

    .history-item:hover { border-color: #a78bfa40; }

    .history-text { color: #cbd5e1; font-size: 15px; max-width: 500px; }

    .history-right { text-align: right; }

    .genre-badge {
      display: inline-block;
      padding: 6px 14px;
      background: linear-gradient(135deg, #7c3aed30, #2563eb30);
      border: 1px solid #a78bfa50;
      border-radius: 50px;
      color: #a78bfa;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .history-confidence { color: #64748b; font-size: 13px; }

.stats-section {
  max-width: 900px;
  margin: 40px auto 0;
  padding: 0 20px;
}

.stats-section h3 {
  font-size: 22px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 20px;
}

.chart-wrap {
  background: #1e1e2e;
  border: 1px solid #ffffff10;
  border-radius: 20px;
  padding: 30px;
}

.chart-row {
  display: flex;
  align-items: center;
  margin-bottom: 16px;
  gap: 12px;
  animation: fadeIn 0.4s ease;
}

.chart-label {
  width: 130px;
  font-size: 14px;
  color: #cbd5e1;
  text-align: right;
  flex-shrink: 0;
}

.chart-bar-wrap {
  flex: 1;
  background: #0f0f1a;
  border-radius: 50px;
  height: 28px;
  overflow: hidden;
}

.chart-bar {
  height: 100%;
  border-radius: 50px;
  background: linear-gradient(90deg, #7c3aed, #2563eb);
  transition: width 1s ease;
  display: flex;
  align-items: center;
  padding-left: 12px;
  min-width: 36px;
}

.chart-count {
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

.stats-empty {
  text-align: center;
  color: #4a4a6a;
  padding: 40px;
}
.recommend-section {
  max-width: 900px;
  margin: 40px auto 0;
  padding: 0 20px;
}

.recommend-card {
  background: #1e1e2e;
  border: 1px solid #ffffff10;
  border-radius: 20px;
  padding: 30px;
}

.recommend-card h3 {
  font-size: 22px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 8px;
}

.genre-select-wrap {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}

select {
  flex: 1;
  background: #0f0f1a;
  border: 1px solid #ffffff20;
  border-radius: 12px;
  padding: 14px 16px;
  color: #fff;
  font-size: 16px;
  outline: none;
  cursor: pointer;
}

.movie-item {
  background: #0f0f1a;
  border: 1px solid #ffffff10;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  animation: fadeIn 0.4s ease;
  transition: border 0.2s;
}

.movie-item:hover { border-color: #a78bfa40; }

.movie-rank {
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, #7c3aed, #2563eb);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  min-width: 40px;
}

.movie-info { flex: 1; }

.movie-title {
  font-size: 18px;
  font-weight: 700;
  color: #e2e8f0;
  margin-bottom: 4px;
}

.movie-year {
  color: #a78bfa;
  font-size: 14px;
  margin-bottom: 8px;
}


.movie-desc { color: #64748b; font-size: 14px; line-height: 1.5; }
    /* Жанр → эмодзи */
  </style>
</head>
<body>

<header>
  <span>🎬</span>
  <h1>CineAI</h1>
</header>

<div class="hero">
  <h2>Классификатор жанров фильмов</h2>
  <p>Опишите фильм — AI мгновенно определит его жанр</p>

  <div class="input-card">
    <div class="input-card" style="margin-top: 16px;">
  <label>🔍 Поиск по названию фильма</label>
  <div style="display: flex; gap: 10px;">
    <input id="searchInput" type="text" placeholder="Например: Форсаж, Титаник, Аватар..."
      style="flex:1; background:#0f0f1a; border:1px solid #ffffff20; border-radius:12px; padding:14px 16px; color:#fff; font-size:16px; outline:none;"
      onkeydown="if(event.key==='Enter') searchByTitle()" />
    <button onclick="searchByTitle()"
      style="padding:14px 24px; background:linear-gradient(135deg,#059669,#0891b2); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; white-space:nowrap;">
      🎬 Найти
    </button>
  </div>
</div>
    <label>Описание фильма</label>
    <textarea id="inputText" placeholder="Например: Группа друзей попадает в заброшенный дом, где их начинает преследовать маньяк..."></textarea>
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">🔍 Определить жанр</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>AI анализирует описание...</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-genre" id="resultGenre"></div>
    <div class="confidence-bar-wrap">
      <div class="confidence-bar" id="confidenceBar" style="width:0%"></div>
    </div>
    <div class="confidence-text" id="confidenceText"></div>
  </div>
</div>

<div class="recommend-section">
  <div class="recommend-card">
    <h3>🏆 Топ-5 фильмов по жанру</h3>
    <p class="game-desc">Выберите жанр — AI подберёт лучшие фильмы</p>
    <div class="genre-select-wrap">
      <select id="genreSelect">
        <option value="Action">💥 Боевик</option>
        <option value="Drama">🎭 Драма</option>
        <option value="Science Fiction">🚀 Фантастика</option>
        <option value="Horror">👻 Ужасы</option>
        <option value="Comedy">😂 Комедия</option>
        <option value="Thriller">🔪 Триллер</option>
        <option value="Romance">❤️ Романтика</option>
        <option value="Animation">🎨 Анимация</option>
        <option value="Documentary">🎥 Документальный</option>
      </select>
      <button onclick="getRecommendations()" style="padding:14px 24px; background:linear-gradient(135deg,#059669,#0891b2); border:none; border-radius:12px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; white-space:nowrap;"> 🎬 Найти </button>
    </div>
    <div id="recommendLoader" style="display:none; text-align:center; padding:20px; color:#94a3b8;">
      <div class="spinner"></div>
      <p>AI подбирает фильмы...</p>
    </div>
    <div id="movieList"></div>
  </div>
</div>

<div class="stats-section">
  <h3>📊 Статистика жанров</h3>
  <div id="statsChart"></div>
</div>

<div class="history-section">
  <div class="history-header">
    <h3>📋 История анализов</h3>
    <button class="btn-clear" onclick="clearHistory()">🗑 Очистить историю</button>
  </div>
  <div id="historyList"></div>
</div>
<script>
  const API = "/api/Analysis";

  const genreEmoji = {
    "Science Fiction": "🚀", "Action": "💥", "Drama": "🎭",
    "Comedy": "😂", "Horror": "👻", "Romance": "❤️",
    "Thriller": "🔪", "Animation": "🎨", "Documentary": "🎥"
  };

  const genreRu = {
    "Science Fiction": "Фантастика", "Action": "Боевик", "Drama": "Драма",
    "Comedy": "Комедия", "Horror": "Ужасы", "Romance": "Романтика",
    "Thriller": "Триллер", "Animation": "Анимация", "Documentary": "Документальный"
  };

  async function analyze() {
    const text = document.getElementById("inputText").value.trim();
    if (!text) return alert("Введите описание фильма!");

    const btn = document.getElementById("analyzeBtn");
    btn.disabled = true;
    document.getElementById("loader").style.display = "block";
    document.getElementById("resultCard").style.display = "none";

    try {
      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });
      const data = await res.json();

      const emoji = genreEmoji[data.label] || "🎬";
      const ru = genreRu[data.label] || data.label;

      document.getElementById("resultEmoji").textContent = emoji;
      document.getElementById("resultGenre").textContent = ru;
      document.getElementById("confidenceText").textContent = `Уверенность: ${data.confidence}%`;
      document.getElementById("resultCard").style.display = "block";

      setTimeout(() => {
        document.getElementById("confidenceBar").style.width = data.confidence + "%";
      }, 100);

      loadHistory();
      loadStats();
    } catch (e) {
      alert("Ошибка соединения с сервером");
    } finally {
      btn.disabled = false;
      document.getElementById("loader").style.display = "none";
    }
  }

  async function loadHistory() {
    const res = await fetch(API);
    const data = await res.json();
    const list = document.getElementById("historyList");

    if (data.length === 0) {
      list.innerHTML = '<div class="history-empty">История анализов пуста</div>';
      return;
    }

    list.innerHTML = data.map(r => `
      <div class="history-item">
        <div class="history-text">${r.inputText}</div>
        <div class="history-right">
          <div class="genre-badge">${genreEmoji[r.label] || "🎬"} ${genreRu[r.label] || r.label}</div>
          <div class="history-confidence">${r.confidence}% уверенность</div>
        </div>
      </div>
    `).join("");
  }

  async function clearHistory() {
    if (!confirm("Очистить всю историю анализов?")) return;
    await fetch(API + "/clear", { method: "DELETE" });
    loadHistory();
    loadStats();
  }

  async function loadStats() {
    const res = await fetch(API + "/stats");
    const data = await res.json();
    const wrap = document.getElementById("statsChart");

    if (data.length === 0) {
      wrap.innerHTML = '<div class="stats-empty">Нет данных для статистики</div>';
      return;
    }

    const max = data[0].count;

    wrap.innerHTML = '<div class="chart-wrap">' + data.map(item => {
      const emoji = genreEmoji[item.genre] || "🎬";
      const ru = genreRu[item.genre] || item.genre;
      const pct = Math.round((item.count / max) * 100);
      return `
        <div class="chart-row">
          <div class="chart-label">${emoji} ${ru}</div>
          <div class="chart-bar-wrap">
            <div class="chart-bar" style="width:${pct}%">
              <span class="chart-count">${item.count}</span>
            </div>
          </div>
        </div>
      `;
    }).join("") + '</div>';
  }
  async function searchByTitle() {
  const title = document.getElementById("searchInput").value.trim();
  if (!title) return alert("Введите название фильма!");

  document.getElementById("loader").style.display = "block";
  document.getElementById("resultCard").style.display = "none";

  try {
    const res = await fetch(API + "/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title })
    });
    const data = await res.json();

    const emoji = genreEmoji[data.label] || "🎬";
    const ru = genreRu[data.label] || data.label;

    document.getElementById("resultEmoji").textContent = emoji;
    document.getElementById("resultGenre").textContent = ru;
    document.getElementById("confidenceText").textContent = `Уверенность: ${data.confidence}%`;
    document.getElementById("resultCard").style.display = "block";

    setTimeout(() => {
      document.getElementById("confidenceBar").style.width = data.confidence + "%";
    }, 100);

    loadHistory();
    loadStats();
  } catch (e) {
    alert("Ошибка соединения с сервером");
  } finally {
    document.getElementById("loader").style.display = "none";
  }
}

async function getRecommendations() {
  const genre = document.getElementById("genreSelect").value;
  document.getElementById("recommendLoader").style.display = "block";
  document.getElementById("movieList").innerHTML = "";

  try {
    const res = await fetch(API + "/recommend", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ genre })
    });
    const movies = await res.json();

    const ranks = ["🥇", "🥈", "🥉", "4️⃣", "5️⃣"];

    document.getElementById("movieList").innerHTML = movies.map((m, i) => `
      <div class="movie-item">
        <div class="movie-rank">${ranks[i]}</div>
        <div class="movie-info">
          <div class="movie-title">${m.title}</div>
          <div class="movie-year">📅 ${m.year}</div>
          <div class="movie-desc">${m.description}</div>
        </div>
      </div>
    `).join("");
  } catch (e) {
    alert("Ошибка соединения с сервером");
  } finally {
    document.getElementById("recommendLoader").style.display = "none";
  }
}

  loadHistory();
  loadStats();
</script>
</body>
</html>
